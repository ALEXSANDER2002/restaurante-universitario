<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UNIFESSPA</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>UNIFESSPA</h1>
            <p>Universidade Federal do Sul e Sudeste do Pará</p>
        </div>
        <div class="main-content">
            <div class="image-section">
                <img src="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=656,h=459,fit=crop/mp8q07LnMQI802XL/phoca_thumb_l_01-mePbNGR8B2Uk0BZw.png" alt="Foto de Equipe">
                <p>Facilidades de uso <br>Agilize a compra e o manuseio de tickets de alimentação do Restaurante Universitário com facilidade.</p>
            </div>
            <div class="login-section">
                <h2>Sistema de Autenticação Centralizada</h2>
                <form action="/login" method="post">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required>
                    
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>
                    
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                
                    <button  onclick="window.location.href='index.html';" class="btn">Entrar</a>
                    </button>
                </form>
                <div class="links">
                    <a href="#">Recuperar senha</a>                    <a href="#">Primeiro acesso</a>
                </div>
                <button class="admin-btn">Administrador</button>
                <p><a href="#">Precisa de ajuda? Clique aqui</a></p>
            </div>
        </div>
    </div>

</body>
</html>
